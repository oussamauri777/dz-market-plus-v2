name: dzmarket_plus_mobile
description: "DZ Market Plus - Achetez et vendez en toute confiance en Algérie."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: any

  # Navigation
  go_router: ^14.3.0

  # State management
  provider: ^6.1.2

  # Fonts
  google_fonts: ^6.2.1

  # Networking
  http: ^1.2.1

  # Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6

  # Images
  cached_network_image: ^3.3.1

  # Storage
  shared_preferences: ^2.3.2

  # UI helpers
  shimmer: ^3.0.0
  pusher_channels_flutter: ^2.6.0
  timeago: ^3.7.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  google_sign_in: ^6.2.0
  geolocator: ^12.0.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.0
  emoji_picker_flutter: ^4.4.0
  record: ^6.2.1
  audioplayers: ^6.7.0
  flutter_local_notifications: ^21.0.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/
